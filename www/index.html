<!DOCTYPE html>
<html>

<head>
	<meta charset='UTF-8'>
	<meta name='viewport' content='initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover'>
	<meta http-equiv='Content-Security-Policy' content="
		default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: blob:;
		script-src * 'self' 'unsafe-inline' 'unsafe-eval';
		style-src * 'self' 'unsafe-inline';
		img-src * 'self' data: blob:;
		media-src * 'self' data: blob:;
		font-src * 'self' data:;
		connect-src * 'self' data: blob:;
		frame-src * 'self';
		object-src 'none';
 ">
	<title>廷琰</title>

	<script src='cordova.js'></script>
	<script>
		// 创建节点
		Document.prototype.node=function(tag='div',attrs={},html=''){
			const o=this.createElement(tag)
			for(let k in attrs){
				if(k.startsWith('on')&&(typeof attrs[k]=='function')){
					o[k]=()=>attrs[k](o)
					continue
				}
				o.setAttribute(k,attrs[k])
			}
			if(html.trim()!='')o.innerHTML=html.trim()
			return o
		}

		// 打印日志
		window.log=function(){
			if('yes'!=='debug'.gc(null))return
			let $=$O.$('#w_logs'),prx=(window.IX?.name||'...').toUpperCase()
			if(!$)$O.body.appendChild($=$O.node('div',{id:'w_logs'}))
			let type=null,s=Array.from(arguments).map(_=>{
				if(_===null||_===undefined)return null
				const t=typeof _=='object',e=t&&Object.prototype.toString.call(_).includes('Error')
				if(!t)return _
				if(!e)return '<pre>'+JSON.stringify(_,null,2)+'</pre>'
				type='error'
				_=_.stack.split('\n').map(v=>v.trim().replace(/\(?file\:\/\/\/android_asset\/www\//,'').replace(/\.js\?_\=[^\:]*\:/,'.js ').replace(/\)$/,'')) // .filter(_=>_.includes('.js'))
				return _.join('<br>')
			}).filter(Boolean)
			if(!type){
				type=s.length>0&&['info','success','error','warn','debug'].includes(s[s.length-1])?s[s.length-1]:null
				if(type)s.length-=1
			}
			$.prepend($O.node('div',{type},prx+': '+s.join('<br>')))
		}

		// 系统错误拦截
		window.onerror=(message,source,lineno,colno,error)=>{
			if(!error.stack.includes('.js'))error.stack='at '+source+':'+lineno+':'+colno+')'
			log(message,error)
		}
		window.addEventListener('unhandledrejection',e=>{
			if(!e.reason)e.promise.catch(_=>log(_?.message||'UnHandledRejection',_,'error'))
			else log(e.reason.message,e.reason,'error')
		})

		// 页面正在加载
		document.addEventListener('DOMContentLoaded',()=>{
			const o=localStorage.getItem('dark')
			if(typeof o=='string'&&o.includes('yes'))document.body.setAttribute('dark','')
			document.body.innerHTML=`<sk w100 p30 pt60 f fv g30><sk q r73></sk><sk q r73></sk><sk q h110></sk><sk b w80 h12></sk><sk b w50 h12></sk></sk>`
		})

		let WI=crypto.randomUUID()
		document.addEventListener('deviceready',()=>{
			document.head.appendChild(document.node('script',{src:`./js/core.js?_=${crypto.randomUUID()}`,onload:_=>{
				log('载入 HLS.JS')
				$O.head.appendChild($O.node('script',{src:`./js/hls.js`,onload:_=>{
					log('载入 HOME.JS')
					$O.head.appendChild($O.node('script',{ix:'',src:`./js/home.js?_=${crypto.randomUUID()}`}))
				}}))
			}}))
		})
	</script>

	<link rel='stylesheet' href='css/style.css'>
	<style ix></style>
</head>

<body></body>

</html>
