<!DOCTYPE html>
<html>

<head>
	<meta charset='UTF-8'>
	<meta name='viewport' content='initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover'>
	<meta http-equiv='Content-Security-Policy' content="
		default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: blob:;
		script-src * 'self' 'unsafe-inline' 'unsafe-eval';
		style-src * 'self' 'unsafe-inline';
		img-src * 'self' data: blob:;
		media-src * 'self' data: blob:;
		font-src * 'self' data:;
		connect-src * 'self' data: blob:;
		frame-src * 'self';
		object-src 'none';
 ">
	<title>廷琰</title>

	<script src='cordova.js'></script>
	<script>
		Document.prototype.node=function(tag='div',attrs={},html=''){
			const o=this.createElement(tag)
			for(let k in attrs){
				if(k.startsWith('on')&&(typeof attrs[k]=='function')){
					o[k]=()=>attrs[k](o)
					continue
				}
				o.setAttribute(k,attrs[k])
			}
			if(html.trim()!='')o.innerHTML=html.trim()
			return o
		}
		window.log=function(){
			let $=document.querySelector('#w_logs')
			if(!$){
				$=document.node('div',{id:'w_logs'})
				document.body.appendChild($)
			}
			let type=null,s=Array.from(arguments).map(_=>{
				if(_===null||_===undefined)return null
				const t=typeof _=='object',e=t&&Object.prototype.toString.call(_).includes('Error')
				if(!t)return _
				if(!e)return '<pre>'+JSON.stringify(_,null,2)+'</pre>'
				type='error'
				_=_.stack.split('\n').map(_=>_.trim().replace(/^at /,'')).filter(_=>_.includes('/www/js/'))
				return _.join('<br>')
			}).filter(Boolean)
			if(!type){
				type=s.length>0&&['info','error','warn','debug'].includes(s[s.length-1])?s[s.length-1]:null
				if(type)s.length-=1
			}
			$.appendChild(document.node('div',{type,onclick:_=>_.remove()},s.join('<br>')))
		}
		window.onerror=(message,source,lineno,colno,error)=>log(message,error)
		window.addEventListener('unhandledrejection',e=>log(e.reason.message,e.reason))
		document.addEventListener('deviceready',()=>{
			document.head.appendChild(document.node('script',{src:'js/core.js',onload:_=>{
				document.head.appendChild(document.node('script',{src:'js/hls.js',onload:_=>{
					document.head.appendChild(document.node('script',{src:'js/ole.js'}))
				}}))
			}}))
		})
	</script>

	<link rel='stylesheet' href='css/style.css'>
</head>

<body>
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 500 200' style='width:90vw;margin:40vh 5vw;object-fit:contain'>
	<polyline fill='none' stroke='#00d704' stroke-width='3' stroke-linecap='round' stroke-linejoin='miter' stroke-dasharray='1000' stroke-dashoffset='1000' points='486.6,113.8 328.2,113.8 310.3,132.3 296,70.7 246.8,127.4 241.6,120.2 233.9,166.4 227,27.6 213.2,118.3 211.8,112.3 205.1,126.1 198.2,108.5 194.1,124.4 184.5,92.9 174.1,113 4.3,113'>
		<animate attributeName='stroke-dashoffset' values='1000;2000;3000;1000' dur='1.5s' repeatCount='indefinite'/>
		<animate attributeName='opacity' values='0;1;1;0;0' dur='1.5s' repeatCount='indefinite'/>
	</polyline>
</svg>
</body>

</html>
