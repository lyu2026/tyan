name: 安卓签名打包

on:
  push:
    tags:
      - 'v*'
      - 'release-*'

jobs:
  o:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Java 17 环境
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 配置 Node.js 20 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: '34'
          build-tools-version: '34.0.0'
          ndk-version: '26.1.10909125'
          cmake-version: '3.27.1'

      - name: 安装 Android SDK Platform 34 及编译工具
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: 全局安装 Cordova
        run: npm install -g cordova@latest

      - name: 安装项目依赖
        run: npm install

      - name: 添加 Android 平台
        run: cordova platform add android

      - name: 配置 Gradle 9.4.1 兼容性
        run: |
          set -e
          
          GRADLE_PROPS="platforms/android/gradle.properties"
          BUILD_GRADLE="platforms/android/app/build.gradle"
          
          # 1. 创建/更新 gradle.properties
          cat > "$GRADLE_PROPS" << 'EOF'
          org.gradle.jvmargs=-Xmx4g -XX:+UseG1GC
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=true
          org.gradle.configureondemand=false
          
          org.gradle.java.installations.auto-detect=false
          org.gradle.java.installations.paths=/usr/lib/jvm/temurin-17-jdk-amd64
          
          android.useAndroidX=true
          android.enableJetifier=true
          android.compileSdkVersion=34
          android.targetSdkVersion=34
          android.minSdkVersion=24
          
          android.enableDexingArtifactTransform=true
          android.nonTransitiveRClass=false
          android.defaults.buildfeatures.aidl=false
          android.defaults.buildfeatures.renderscript=false
          
          android.aidl.enableParcelable=false
          EOF
          
          cp "$BUILD_GRADLE" "$BUILD_GRADLE.bak"
          
          cat >> "$BUILD_GRADLE" << 'EOF'
          compileOptions {
              sourceCompatibility = JavaVersion.VERSION_17
              targetCompatibility = JavaVersion.VERSION_17
          }
          kotlinOptions {
              jvmTarget = "17"
          }
          tasks.withType(JavaCompile) {
              options.compilerArgs += [
                  '-Xlint:deprecation',
                  '-Xlint:unchecked'
              ]
          }
          buildTypes {
              release {
                  minifyEnabled false
                  debuggable false
                  shrinkResources false
                  proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                  ndk {
                      debugSymbolLevel 'full'
                  }
              }
              debug {
                  minifyEnabled false
                  debuggable true
                  debugSymbolLevel 'full'
              }
          }
          android {
              ndkVersion "26.1.10909125"
              defaultConfig {
                  ndk {
                      abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64'
                  }
              }
          }
          EOF

      - name: 创建网络安全配置
        run: |
          mkdir -p platforms/android/app/src/main/res/xml
          
          cat > platforms/android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">*</domain>
                  <trust-anchors>
                      <certificates src="system" />
                      <certificates src="user" />
                  </trust-anchors>
              </domain-config>
              <debug>
                  <trust-anchors>
                      <certificates src="system" />
                      <certificates src="user" />
                  </trust-anchors>
              </debug>
             <trust-anchors>
                  <certificates src="system" />
              </trust-anchors>
              <cleartextTrafficPermitted>true</cleartextTrafficPermitted>
          </network-security-config>
          EOF

      - name: 更新 AndroidManifest.xml
        run: |
          MANIFEST="platforms/android/app/src/main/AndroidManifest.xml"
          
          # 确保包含必要的权限
          if ! grep -q 'android:usesCleartextTraffic="true"' "$MANIFEST"; then
            sed -i 's/<application/<application android:usesCleartextTraffic="true"/g' "$MANIFEST"
          fi
          
          if ! grep -q 'android:networkSecurityConfig' "$MANIFEST"; then
            sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/g' "$MANIFEST"
          fi

      - name: 创建 build.json
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > build.json << EOF
          {
            "android": {
              "release": {
                "keystore": "\$HOME/.android/release.keystore",
                "storePassword": "$KEYSTORE_PASSWORD",
                "alias": "$KEY_ALIAS",
                "password": "$KEY_PASSWORD",
                "keystoreType": "jks"
              }
            }
          }
          EOF
          
          echo "✓ build.json created"

      # ========== Gradle Validation ==========
      - name: Validate Gradle build configuration
        run: |
          cd platforms/android
          
          echo "=== Gradle Version ==="
          ./gradlew --version
          
          echo ""
          echo "=== Gradle Configuration ==="
          ./gradlew -DShowBuildCache properties 2>&1 | grep -E "android|java|gradle|version" | head -20
          
          echo ""
          echo "=== Tasks Available ==="
          ./gradlew tasks --quiet 2>&1 | head -15
          
          cd ../..

      - name: 清洗并准备
        run: |
          cordova clean android
          rm -rf platforms/android/build
          rm -rf ~/.gradle/caches/build-cache
          rm -rf ~/.gradle/caches/gradle-*.jar
          
          cd platforms/android
          ./gradlew clean --quiet
          cd ../..

      - name: 调用签名信息
        id: keystore
        uses: ./.github/actions/keystore

      - name: 分 CPU 架构打包签名 APK
        run: |
          # 从 Action 输出读取签名参数
          KEYSTORE_PATH="${{ steps.keystore.outputs.keystore_path }}"
          STORE_PASSWORD="${{ steps.keystore.outputs.store_password }}"
          KEY_ALIAS="${{ steps.keystore.outputs.key_alias }}"
          KEY_PASSWORD="${{ steps.keystore.outputs.key_password }}"

          # 支持的三种 CPU 架构
          ABIS=("arm64-v8a" "armeabi-v7a" "x86_64")
          mkdir -p output

          for ABI in "${ABIS[@]}"; do
            echo ">>> 正在打包架构：$ABI"

            cordova build android --release -- \
              --packageType=apk \
              --gradleArg="-Pandroid.defaultConfig.abiFilters=$ABI" \
              --keystore="$KEYSTORE_PATH" \
              --storePassword="$STORE_PASSWORD" \
              --alias="$KEY_ALIAS" \
              --password="$KEY_PASSWORD"

            # 按架构重命名归档
            cp platforms/android/app/build/outputs/apk/release/app-release.apk \
               output/${ABI}.apk

            echo ">>> $ABI 打包完成"
          done

      - name: 获取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="manual-$(date +'%Y%m%d-%H%M%S')"
            VERSION="$TAG_NAME"
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
            VERSION=$(echo "$TAG_NAME" | sed 's/^v//' | sed 's/^release-//')
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 获取构建时间
        id: time
        run: |
          export TZ='Asia/Shanghai'
          echo "datetime=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 获取 APK 信息
        id: apk_info
        run: |
          cd output
          
          # 生成文件列表和 SHA256
          echo "### 📦 APK 文件清单" > ../release_body.md
          echo "" >> ../release_body.md
          echo "| 架构 | 文件名 | 大小 | SHA256 |" >> ../release_body.md
          echo "|------|--------|------|--------|" >> ../release_body.md
          
          for apk in *.apk; do
            SIZE=$(ls -lh "$apk" | awk '{print $5}')
            SHA256=$(sha256sum "$apk" | cut -d ' ' -f 1)
            ARCH=${apk%.apk}
            
            echo "| $ARCH | $apk | $SIZE | \`$SHA256\` |" >> ../release_body.md
            
            # 保存到输出变量
            echo "${ARCH}_sha256=$SHA256" >> $GITHUB_OUTPUT
            echo "${ARCH}_size=$SIZE" >> $GITHUB_OUTPUT
          done
          
          cd ..
          
          # 生成完整的 Release Body
          cat >> release_body_full.md << EOF
          ## 🫧 廷琰 v${{ steps.version.outputs.version }}
          
          ### 📦 版本信息
          | 项目 | 信息 |
          |------|------|
          | 版本号 | v${{ steps.version.outputs.version }} |
          | 构建时间 | ${{ steps.time.outputs.datetime }} |
          | 构建类型 | Release（签名） |
          
          $(cat release_body.md)
          
          ### 📥 安装说明
          1. 根据手机 CPU 架构选择对应的 APK
             - 大多数现代手机选择 \`arm64-v8a\`
             - 老旧手机选择 \`armeabi-v7a\`
             - 模拟器选择 \`x86_64\`
          2. 下载后在手机上允许"安装未知来源应用"
          3. 点击 APK 进行安装
          
          ### 🔍 查看 CPU 架构
          如不确定手机架构，可安装 [Device Info HW](https://play.google.com/store/apps/details?id=ru.andr7e.deviceinfohw) 查看
          EOF

      - name: 创建 Release 并上传 APK
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: 廷琰 v${{ steps.version.outputs.version }}
          body_path: release_body_full.md
          files: output/*.apk
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

