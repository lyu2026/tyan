name: 构建签名包

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 查看代码库
        uses: actions/checkout@v4

      - name: 安装 Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-33'

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 安装插件
        run: |
          cordova plugin add cordova-plugin-advanced-http
          cordova plugin add cordova-plugin-screen-orientation
          cordova plugin add cordova-plugin-file

      - name: 安装依赖组件
        run: npm install

      - name: 解密 Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "❌ 错误：KEYSTORE_BASE64 secret 未设置"
            exit 1
          fi
          # 清理空白字符并解码
          echo "$KEYSTORE_BASE64" | tr -d '\n\r\t ' | base64 -d > release.keystore
          
          # 验证 keystore 文件
          if [ ! -s release.keystore ]; then
            echo "❌ 错误：keystore 解码失败或文件为空"
            exit 1
          fi
          echo "✅ Keystore 解码成功，文件大小: $(ls -lh release.keystore | awk '{print $5}')"

      - name: 构建签名包
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cordova platform add android@latest
          cordova build android --release -- \
            --keystore=release.keystore \
            --storePassword="$KEYSTORE_PASSWORD" \
            --alias="$KEY_ALIAS" \
            --password="$KEY_PASSWORD"

      - name: 包文件重命名
        id: apk
        run: |
          # 查找已签名的 APK（排除未对齐的）
          APK_PATH=$(find platforms/android -name "*.apk" ! -name "*.unaligned.apk" ! -name "*-unsigned.apk" | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ 未找到已签名的 APK 文件"
            echo "尝试查找所有 APK："
            find . -name "*.apk" -type f
            exit 1
          fi
          
          RELEASE_NAME="廷琰.apk"
          cp "$APK_PATH" "$RELEASE_NAME"
          
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          
          echo "✅ APK 文件: $RELEASE_NAME"
          ls -lh "$RELEASE_NAME"

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: 廷琰
          path: ${{ steps.apk.outputs.release_name }}
          retention-days: 30

      - name: 获取包信息
        id: apk_info
        run: |
          echo "size=$(ls -lh ${{ steps.apk.outputs.release_name }} | awk '{print $5}')" >> $GITHUB_OUTPUT
          echo "sha256=$(sha256sum ${{ steps.apk.outputs.release_name }} | cut -d ' ' -f 1)" >> $GITHUB_OUTPUT
          
          echo "## 📦 构建信息" >> $GITHUB_STEP_SUMMARY
          echo "- **文件名**: 廷琰.apk" >> $GITHUB_STEP_SUMMARY
          echo "- **大小**: $(ls -lh ${{ steps.apk.outputs.release_name }} | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA256**: \`$(sha256sum ${{ steps.apk.outputs.release_name }} | cut -d ' ' -f 1)\`" >> $GITHUB_STEP_SUMMARY

      - name: 清理敏感文件
        if: always()
        run: rm -f release.keystore