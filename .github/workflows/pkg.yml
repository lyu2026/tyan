name: 签名打包

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 配置 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装安卓SDK
        uses: android-actions/setup-android@v3

      - name: 接受SDK许可
        run: yes | sdkmanager --licenses

      - name: 安装打包组件
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 安装 Cordova
        run: npm install -g cordova@^13.0.0

      - name: 安装项目依赖
        run: npm install

      - name: 添加安卓平台
        run: cordova platform add android@13.0.0

      - name: 配置 ABI 过滤
        run: |
          cat > platforms/android/app/build-extras.gradle << 'EOF'
          android {
              defaultConfig {
                  if (project.hasProperty('targetAbi')) {
                      ndk {
                          abiFilters project.getProperty('targetAbi')
                      }
                  }
              }
          }
          EOF

      - name: 拷贝网络安全配置
        run: |
          # 确保 res/xml 目录存在
          mkdir -p platforms/android/app/src/main/res/xml
          # 拷贝网络安全配置文件
          cp res/xml/network_security_config.xml platforms/android/app/src/main/res/xml/network_security_config.xml
          # 验证文件已正确放置
          ls -la platforms/android/app/src/main/res/xml/network_security_config.xml

      - name: 解密签名信息
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$GITHUB_WORKSPACE/tyan.keystore"

      - name: 区分架构打包
        run: |
          KEYSTORE_PATH="$GITHUB_WORKSPACE/tyan.keystore"
          ABIS=("arm64-v8a" "armeabi-v7a")
          mkdir -p output

          for ABI in "${ABIS[@]}"; do
            echo ">>> 正在打包架构：$ABI"

            cordova build android --release -- \
              --packageType=apk \
              --gradleArg="-PtargetAbi=$ABI" \
              --keystore="$KEYSTORE_PATH" \
              --storePassword="Tyan2026" \
              --alias="tyan" \
              --password="Tyan2026"

            cp platforms/android/app/build/outputs/apk/release/app-release.apk \
               output/${ABI}.apk

            echo ">>> $ABI 打包完成"
          done

      - name: 获取版本编号
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=$(echo "$TAG_NAME" | sed 's/^v//' | sed 's/^release-//')
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 获取构建时间
        id: time
        run: |
          export TZ='Asia/Shanghai'
          echo "datetime=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 重命名 APK
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd output
          for apk in *.apk; do
            ABI=$(basename "$apk" .apk)
            mv "$apk" "tyan-v${VERSION}-${ABI}.apk"
          done
          ls -lh

      - name: 生成发布信息
        id: apk_info
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd output
          {
            echo "### 📦 APK 文件清单"
            echo ""
            echo "| 文件名 | 大小 | SHA256 |"
            echo "|--------|------|--------|"
            for apk in *.apk; do
              SIZE=$(ls -lh "$apk" | awk '{print $5}')
              SHA256=$(sha256sum "$apk" | cut -d ' ' -f 1)
              echo "| $apk | $SIZE | \`$SHA256\` |"
            done
          } > ../release_body.md
          cd ..

          CURRENT_TAG="${{ steps.version.outputs.tag_name }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            {
              echo "### 📝 更新内容"
              echo ""
              git log "${PREV_TAG}..${CURRENT_TAG}" \
                --pretty=format:"- %s (%h, @%an)" \
                --no-merges
              echo ""
            } > release_changelog.md
          else
            printf "### 📝 更新内容\n\n首次发布 🎉\n" > release_changelog.md
          fi

          CHANGELOG=$(cat release_changelog.md)
          MANIFEST=$(cat release_body.md)
          DATETIME="${{ steps.time.outputs.datetime }}"

          {
            echo "## 🫧 廷琰 V${VERSION}"
            echo ""
            echo "### 📦 版本信息"
            echo "| 项目 | 信息 |"
            echo "|------|------|"
            echo "| 版本号 | V${VERSION} |"
            echo "| 构建时间 | ${DATETIME} |"
            echo "| 构建类型 | Release（签名） |"
            echo ""
            echo "${CHANGELOG}"
            echo ""
            echo "${MANIFEST}"
            echo ""
            echo "### 📥 安装说明"
            echo "1. 大多数现代手机选择 \`arm64-v8a\`"
            echo "2. 老旧手机选择 \`armeabi-v7a\`"
            echo "3. 下载后在手机上允许安装未知来源应用"
            echo "4. 点击 APK 进行安装"
          } > release_body_full.md

      - name: 发布并上传包
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: 廷琰 v${{ steps.version.outputs.version }}
          body_path: release_body_full.md
          files: output/*.apk
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建完成通知
        if: success()
        run: |
          echo "✅ 所有 APK 包构建成功"
          ls -lh output/

      - name: 构建失败通知
        if: failure()
        run: |
          echo "❌ 构建失败，请检查日志"
          exit 1