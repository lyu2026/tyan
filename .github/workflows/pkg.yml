name: 签名打包

on:
  push:
    tags:
      - 'v*'

jobs:
  clear:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: 清理无效执行
        run: |
          echo ">>> 获取仓库所有 workflow runs"
          ALL_RUNS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100" \
            | jq -r '.workflow_runs[] | "\(.id)|\(.head_branch)|\(.status)|\(.conclusion)|\(.display_title)"')
          if [ -z "$ALL_RUNS" ]; then
            echo ">>> 没有找到任何 workflow runs"
            exit 0
          fi
          echo ">>> 当前 tag: ${{ github.ref_name }}"
          echo ">>> 当前 run: #${{ github.run_number }} (ID: ${{ github.run_id }})"
          DELETE_IDS=""
          while IFS= read -r line; do
            ID=$(echo "$line" | cut -d'|' -f1)
            BRANCH=$(echo "$line" | cut -d'|' -f2)
            STATUS=$(echo "$line" | cut -d'|' -f3)
            CONCLUSION=$(echo "$line" | cut -d'|' -f4)
            TITLE=$(echo "$line" | cut -d'|' -f5)
            if [ "$ID" = "${{ github.run_id }}" ]; then
              echo ">>> 跳过当前 run: #${{ github.run_number }} $ID"
              continue
            fi
            if [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ] || [ "$STATUS" = "cancelled" ] || [ "$BRANCH" = "${{ github.ref_name }}" ]; then
              echo ">>> 标记删除: $ID ($BRANCH, $STATUS, $CONCLUSION)"
              DELETE_IDS="$DELETE_IDS $ID"
            fi
          done <<< "$ALL_RUNS"
          if [ -z "$DELETE_IDS" ]; then
            echo ">>> 没有需要清理的 runs"
          else
            echo ">>> 正在删除..."
            for ID in $DELETE_IDS; do
              echo ">>> 删除 run $ID"
              STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${{ github.repository }}/actions/runs/$ID")
              if [ "$STATUS_CODE" = "204" ]; then
                echo "    ✅ 删除成功"
              else
                echo "    ❌ 删除失败 (HTTP $STATUS_CODE)"
              fi
            done
            echo ">>> 清理完成"
          fi

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 缓存命令工具
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/cmdline-tools/16.0
          key: android-cmdline-tools-16.0-${{ runner.os }}

      - name: 修复SDK版本
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          echo ">>> 清理错误的预装版本"
          rm -rf /usr/local/lib/android/sdk/cmdline-tools/latest
          
          echo ">>> 下载正确的命令行工具"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip
          unzip -q commandlinetools-linux-*.zip -d /tmp/cmdline-tools
          mkdir -p /usr/local/lib/android/sdk/cmdline-tools
          mv /tmp/cmdline-tools/cmdline-tools /usr/local/lib/android/sdk/cmdline-tools/16.0
          
          echo ">>> 创建 latest 软链接"
          ln -sf /usr/local/lib/android/sdk/cmdline-tools/16.0 /usr/local/lib/android/sdk/cmdline-tools/latest

      - name: 设置环境变量
        run: |
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/cmdline-tools/16.0/bin" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: 接受SDK许可
        run: yes | sdkmanager --licenses > /dev/null 2>&1

      - name: 安装打包组件
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" > /dev/null 2>&1

      - name: 配置 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 修复 npm 缓存
        run: |
          rm -rf ~/.npm /home/runner/.npm
          CLEAN_CACHE_DIR=$(mktemp -d -t npm-cache-XXXXXX)
          mkdir -p "$CLEAN_CACHE_DIR"
          npm config set cache "$CLEAN_CACHE_DIR"
          npm config set prefer-offline false
          npm config set prefer-online true

      - name: 安装科尔多瓦
        run: npm install -g cordova@^13.0.0

      - name: 安装项目依赖
        run: |
          npm install

      - name: 添加安卓平台
        run: |
          rm -rf platforms/android/app/build platforms/android/build platforms/android/.gradle output
          cordova platform add android@13.0.0

      - name: 强制Kotn版本
        run: |
          if [ -f "platforms/android/app/build.gradle.kts" ]; then
            GRADLE_FILE="platforms/android/app/build.gradle.kts"
            USE_KTS=true
          else
            GRADLE_FILE="platforms/android/app/build.gradle"
            USE_KTS=false
          fi
          echo ">>> 检测到文件: $GRADLE_FILE"
          if grep -q "kotlin-stdlib.*1.9.22" "$GRADLE_FILE"; then
            echo ">>> Kotlin 版本已锁定，跳过"
          else
            echo ">>> 正在锁定 Kotlin 版本到 1.9.22"
            if [ "$USE_KTS" = true ]; then
              echo "" >> "$GRADLE_FILE"
              echo "configurations.all {" >> "$GRADLE_FILE"
              echo "    resolutionStrategy {" >> "$GRADLE_FILE"
              echo '        force("org.jetbrains.kotlin:kotlin-stdlib:1.9.22")' >> "$GRADLE_FILE"
              echo '        force("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22")' >> "$GRADLE_FILE"
              echo '        force("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22")' >> "$GRADLE_FILE"
              echo "    }" >> "$GRADLE_FILE"
              echo "}" >> "$GRADLE_FILE"
            else
              echo "" >> "$GRADLE_FILE"
              echo "configurations.all {" >> "$GRADLE_FILE"
              echo "    resolutionStrategy {" >> "$GRADLE_FILE"
              echo "        force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22'" >> "$GRADLE_FILE"
              echo "        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22'" >> "$GRADLE_FILE"
              echo "        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22'" >> "$GRADLE_FILE"
              echo "    }" >> "$GRADLE_FILE"
              echo "}" >> "$GRADLE_FILE"
            fi
            echo ">>> Kotlin 版本锁定完成"
          fi
          echo ">>> 验证当前配置"
          grep -A4 "resolutionStrategy" "$GRADLE_FILE" || echo "(未找到 resolutionStrategy)"

      - name: 配置 ABI过滤
        run: |
          cat > platforms/android/app/build-extras.gradle << 'EOF'
          android {
              defaultConfig {
                  if (project.hasProperty('targetAbi')) {
                      ndk {
                          abiFilters project.getProperty('targetAbi')
                      }
                  }
              }
          }
          EOF

      - name: 注入网络配置
        run: |
          echo ">>> 创建 network_security_config.xml"
          mkdir -p platforms/android/app/src/main/res/xml
          cat > platforms/android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system" />
                      <certificates src="user" />
                  </trust-anchors>
              </base-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">*.*</domain>
                  <domain includeSubdomains="true">localhost</domain>
                  <trust-anchors>
                      <certificates src="system" />
                      <certificates src="user" />
                  </trust-anchors>
              </domain-config>
          </network-security-config>
          EOF

          echo ">>> 修改 AndroidManifest.xml 引用网络安全配置"
          MANIFEST="platforms/android/app/src/main/AndroidManifest.xml"
          if grep -q "android:networkSecurityConfig" "$MANIFEST"; then
            echo "networkSecurityConfig 已存在，跳过"
          else
            sed -i 's|<application|<application android:networkSecurityConfig="@xml/network_security_config"|' "$MANIFEST"
            echo "已注入 networkSecurityConfig"
          fi

          echo ">>> 清理可能被误拷贝的 config.xml"
          rm -f platforms/android/app/src/main/res/xml/config.xml
          rm -f platforms/android/res/xml/config.xml

          echo ">>> 验证"
          ls -la platforms/android/app/src/main/res/xml/network_security_config.xml
          grep "networkSecurityConfig" "$MANIFEST"

      - name: 解密签名信息
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$GITHUB_WORKSPACE/tyan.keystore"

      - name: 区分架构打包
        run: |
          KEYSTORE_PATH="$GITHUB_WORKSPACE/tyan.keystore"
          ABIS=("arm64-v8a" "armeabi-v7a")
          mkdir -p output

          for ABI in "${ABIS[@]}"; do
            echo ">>> 正在打包架构：$ABI"

            rm -f platforms/android/app/src/main/res/xml/config.xml
            rm -f platforms/android/res/xml/config.xml

            cordova build android --release -- \
              --packageType=apk \
              --gradleArg="-PtargetAbi=$ABI" \
              --keystore="$KEYSTORE_PATH" \
              --storePassword="Tyan2026" \
              --alias="tyan" \
              --password="Tyan2026"

            cp platforms/android/app/build/outputs/apk/release/app-release.apk \
               output/${ABI}.apk

            echo ">>> $ABI 打包完成"
          done

      - name: 获取版本编号
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=$(echo "$TAG_NAME" | sed 's/^v//' | sed 's/^release-//')
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 获取构建时间
        id: time
        run: |
          export TZ='Asia/Shanghai'
          echo "datetime=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 生成发布信息
        id: apk_info
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd output
          {
            echo "### 📦 APK 文件清单"
            echo ""
            echo "| 文件名 | 大小 | SHA256 |"
            echo "|--------|------|--------|"
            for apk in *.apk; do
              SIZE=$(ls -lh "$apk" | awk '{print $5}')
              SHA256=$(sha256sum "$apk" | cut -d ' ' -f 1)
              echo "| $apk | $SIZE | \`$SHA256\` |"
            done
          } > ../release_body.md
          cd ..

          CURRENT_TAG="${{ steps.version.outputs.tag_name }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            {
              echo "### 📝 更新内容"
              echo ""
              git log "${PREV_TAG}..${CURRENT_TAG}" \
                --pretty=format:"- %s (%h, @%an)" \
                --no-merges
              echo ""
            } > release_changelog.md
          else
            printf "### 📝 更新内容\n\n首次发布 🎉\n" > release_changelog.md
          fi

          CHANGELOG=$(cat release_changelog.md)
          MANIFEST=$(cat release_body.md)
          DATETIME="${{ steps.time.outputs.datetime }}"

          {
            echo "## 🫧 廷琰 V${VERSION}"
            echo ""
            echo "### 📦 版本信息"
            echo "| 项目 | 信息 |"
            echo "|------|------|"
            echo "| 版本号 | V${VERSION} |"
            echo "| 构建时间 | ${DATETIME} |"
            echo ""
            echo "${CHANGELOG}"
            echo ""
            echo "${MANIFEST}"
            echo ""
            echo "### 📥 安装说明"
            echo "1. 大多数现代手机选择 \`arm64-v8a\`"
            echo "2. 老旧手机选择 \`armeabi-v7a\`"
            echo "3. 下载后在手机上允许安装未知来源应用"
            echo "4. 点击 APK 进行安装"
          } > release_body_full.md

      - name: 发布并上传包
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: 廷琰 v${{ steps.version.outputs.version }}
          body_path: release_body_full.md
          files: output/*.apk
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建完成通知
        if: success()
        run: |
          echo "✅ 所有 APK 包构建成功"
          ls -lh output/

      - name: 构建失败通知
        if: failure()
        run: |
          echo "❌ 构建失败，请检查日志"
          exit 1