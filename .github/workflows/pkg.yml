name: 签名打包

on:
  push:
    tags:
      - 'v*'
      - 'release-*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 JV17 库
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 配置 N20 库
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装安卓SDK
        uses: android-actions/setup-android@v3

      - name: 安装打包组件
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: 安装科尔多瓦
        run: npm install -g cordova@latest

      - name: 安装项目依赖
        run: npm install

      - name: 添加安卓平台
        run: cordova platform add android

      - name: 修改 AndroidManifest
        run: |
          MANIFEST="platforms/android/app/src/main/AndroidManifest.xml"

          if grep -q 'requestLegacyExternalStorage' "$MANIFEST"; then
            echo "✓ requestLegacyExternalStorage 已存在，跳过"
          else
            sed -i 's|<application|<application android:requestLegacyExternalStorage="true"|' "$MANIFEST"
            echo "✓ 已添加 requestLegacyExternalStorage"
          fi

          if grep -q 'networkSecurityConfig' "$MANIFEST"; then
            echo "✓ networkSecurityConfig 已存在，跳过"
          else
            sed -i 's|<application|<application android:networkSecurityConfig="@xml/network_security_config"|' "$MANIFEST"
            echo "✓ 已注册 networkSecurityConfig"
          fi

      - name: 创建网络安全配置
        run: |
          mkdir -p platforms/android/app/src/main/res/xml
          cat > platforms/android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system" />
                <certificates src="user" />
              </trust-anchors>
            </base-config>
          </network-security-config>
          EOF
          echo "✓ 网络安全配置已写入"

      - name: 解密签名信息
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$GITHUB_WORKSPACE/tyan.keystore"

      - name: 区分架构打包
        run: |
          KEYSTORE_PATH="$GITHUB_WORKSPACE/tyan.keystore"
          ABIS=("arm64-v8a" "armeabi-v7a" "x86_64")
          mkdir -p output

          for ABI in "${ABIS[@]}"; do
            echo ">>> 正在打包架构：$ABI"

            cordova clean android

            mkdir -p platforms/android/app/src/main/res/drawable-nodpi
            mkdir -p platforms/android/app/src/main/res/values
            mkdir -p platforms/android/app/src/main/res/values-night

            cat > platforms/android/app/src/main/res/drawable-nodpi/splashscreen.xml << 'SVGEOF'
            <?xml version="1.0" encoding="utf-8"?>
            <vector xmlns:android="http://schemas.android.com/apk/res/android"
                android:width="240dp"
                android:height="240dp"
                android:viewportWidth="200"
                android:viewportHeight="200">
                <path android:fillColor="#182f7c" android:pathData="M22 160C24.454 143.054 16.5853 132.65 13.4815 116C9.97234 97.1759 12.736 78.2877 20.9155 61C26.0869 50.0703 33.9203 40.2336 43 32.3156C51.482 24.9189 61.375 19.0889 72 15.3539C148.419 -11.5096 215.961 76.5528 176.557 145C169.578 157.123 159.687 167.613 148 175.289C129.186 187.646 105.13 193.147 83 188.101C67.2432 184.509 55.4391 173.824 39 178L39 180C71.5954 201.934 113.59 208.388 149 188.107C211.847 152.113 216.694 57.2914 156 16.5412C106.911 -16.4176 37.3621 1.39795 11.2711 55C-0.893272 79.9908 -2.33571 109.918 7.4357 136C10.4118 143.944 14.4601 155.464 22 160z"/>
                <path android:fillColor="#e7012f" android:pathData="M152 32C129.661 54.2096 100.324 57.2205 75 73.7193C43.9509 93.9482 23.9661 142.848 22 179C37.5865 160.674 46.6722 137.953 65.0033 121.197C77.1959 110.051 90.6913 101.114 106 94.8735C116.446 90.6153 127.88 89.3212 136.94 82.0781C148.864 72.5449 157.553 46.8596 152 32z"/>
                <path android:fillColor="#fdd10d" android:pathData="M29 173C43.0987 162.737 53.7887 151.332 70 143.794C98.7821 130.409 129.676 132.568 139 95C99.2805 102.494 70.5991 114.991 45.1159 148C39.2031 155.659 31.9352 163.64 29 173z"/>
                <path android:fillColor="#189b46" android:pathData="M109 141C99.6665 144.353 89.6053 142.785 80 144.495C62.1128 147.679 34.3205 163.533 26 180C35.3374 176.038 43.8144 171.84 54 170.329C67.3509 168.348 80.8788 170.053 93 162.874C99.4792 159.036 110.743 149.55 109 141z"/>
                <path android:fillColor="#182f7c" android:pathData="M12.0314 180.845C-0.397656 185.854 8.59856 204.19 20.9267 199.02C32.7652 194.055 23.5938 176.186 12.0314 180.845z"/>
            </vector>
            SVGEOF

            cat > platforms/android/app/src/main/res/values/colors.xml << 'COLOREOF'
            <?xml version='1.0' encoding='utf-8'?>
            <resources>
                <color name="cdv_splashscreen_background">#FFFFFF</color>
            </resources>
            COLOREOF

            cat > platforms/android/app/src/main/res/values-night/colors.xml << 'NIGHTEOF'
            <?xml version='1.0' encoding='utf-8'?>
            <resources>
                <color name="cdv_splashscreen_background">#121212</color>
            </resources>
            NIGHTEOF

            echo "✓ 开屏资源已写入"

            cordova build android --release -- \
              --packageType=apk \
              --gradleArg="-Pandroid.defaultConfig.abiFilters=$ABI" \
              --keystore="$KEYSTORE_PATH" \
              --storePassword="Tyan2026" \
              --alias="tyan" \
              --password="Tyan2026"

            cp platforms/android/app/build/outputs/apk/release/app-release.apk \
               output/${ABI}.apk

            echo ">>> $ABI 打包完成"
          done

      - name: 获取版本编号
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=$(echo "$TAG_NAME" | sed 's/^v//' | sed 's/^release-//')
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 获取构建时间
        id: time
        run: |
          export TZ='Asia/Shanghai'
          echo "datetime=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 生成发布信息
        id: apk_info
        run: |
          cd output

          {
            echo "### 📦 APK 文件清单"
            echo ""
            echo "| 文件名 | 大小 | SHA256 |"
            echo "|--------|------|--------|"
            for apk in *.apk; do
              SIZE=$(ls -lh "$apk" | awk '{print $5}')
              SHA256=$(sha256sum "$apk" | cut -d ' ' -f 1)
              echo "| $apk | $SIZE | \`$SHA256\` |"
            done
          } > ../release_body.md

          cd ..

          CURRENT_TAG="${{ steps.version.outputs.tag_name }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            {
              echo "### 📝 更新内容"
              echo ""
              git log "${PREV_TAG}..${CURRENT_TAG}" \
                --pretty=format:"- %s (%h, @%an)" \
                --no-merges
              echo ""
            } > release_changelog.md
          else
            printf "### 📝 更新内容\n\n首次发布 🎉\n" > release_changelog.md
          fi

          CHANGELOG=$(cat release_changelog.md)
          MANIFEST=$(cat release_body.md)
          VERSION="${{ steps.version.outputs.version }}"
          DATETIME="${{ steps.time.outputs.datetime }}"

          cat > release_body_full.md << EOF
          ## 🫧 廷琰 V${VERSION}
          
          ### 📦 版本信息
          | 项目 | 信息 |
          |------|------|
          | 版本号 | V${VERSION} |
          | 构建时间 | ${DATETIME} |
          | 构建类型 | Release（签名） |
          
          ${CHANGELOG}
          
          ${MANIFEST}
          
          ### 📥 安装说明
          1. 根据手机 CPU 架构选择对应的 APK
             - 大多数现代手机选择 \`arm64-v8a\`
             - 老旧手机选择 \`armeabi-v7a\`
             - 模拟器选择 \`x86_64\`
          2. 下载后在手机上允许"安装未知来源应用"
          3. 点击 APK 进行安装
          
          ### 🔍 查看 CPU 架构
          如不确定手机架构，可安装 [Device Info HW](https://play.google.com/store/apps/details?id=ru.andr7e.deviceinfohw) 查看
          EOF

      - name: 发布并上传包
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: 廷琰 v${{ steps.version.outputs.version }}
          body_path: release_body_full.md
          files: output/*.apk
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建完成通知
        if: success()
        run: |
          echo "✅ 所有 APK 包构建成功"
          ls -lh output/

      - name: 构建失败通知
        if: failure()
        run: |
          echo "❌ 构建失败，请检查日志"
          exit 1
