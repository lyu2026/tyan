name: Build Android APKs

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name'
        required: true
        default: '1.0.0'
      version_code:
        description: 'Version Code'
        required: true
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86, x86_64]
        include:
          - arch: arm64-v8a
            apk-suffix: arm64
          - arch: armeabi-v7a
            apk-suffix: arm
          - arch: x86
            apk-suffix: x86
          - arch: x86_64
            apk-suffix: x64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-33 build-tools;33.0.0'

    - name: Generate keystore
      run: |
        keytool -genkey -v \
          -keystore debug.keystore \
          -alias androiddebugkey \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass android \
          -keypass android \
          -dname "CN=Android Debug, O=Android, C=US"

    - name: Install dependencies
      run: |
        npm install
        npm install -g cordova

    - name: Add Android platform
      run: cordova platform add android@latest

    - name: Set version info
      id: version
      run: |
        VERSION_NAME="${{ github.event.inputs.version_name || github.ref_name }}"
        VERSION_CODE="${{ github.event.inputs.version_code || github.run_number }}"
        
        # 移除可能的 'v' 前缀
        VERSION_NAME="${VERSION_NAME#v}"
        
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
        echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
        
        echo "Version: $VERSION_NAME (code: $VERSION_CODE)"

    - name: Update config.xml version
      run: |
        # 更新 widget 的 version 属性
        sed -i "s/version=\"[^\"]*\"/version=\"${{ env.VERSION_NAME }}\"/" config.xml
        
        # 更新或添加 android-versionCode
        if grep -q "android-versionCode" config.xml; then
          sed -i "s/android-versionCode=\"[^\"]*\"/android-versionCode=\"${{ env.VERSION_CODE }}\"/" config.xml
        else
          sed -i "s/<widget /<widget android-versionCode=\"${{ env.VERSION_CODE }}\" /" config.xml
        fi

    - name: Configure build.gradle for multi-arch
      run: |
        # 修改主 build.gradle 文件
        cat >> platforms/android/app/build.gradle << 'EOF'
        
        // Multi-architecture configuration
        android {
            splits {
                abi {
                    enable true
                    reset()
                    include 'arm64-v8a', 'armeabi-v7a', 'x86', 'x86_64'
                    universalApk false
                }
            }
        }
        
        // Rename APK files
        android.applicationVariants.all { variant ->
            variant.outputs.all { output ->
                def abi = output.getFilter("ABI")
                if (abi != null) {
                    outputFileName = "app-${abi}.apk"
                }
            }
        }
        EOF
        
        echo "Updated build.gradle:"
        tail -20 platforms/android/app/build.gradle

    - name: Create signing config
      run: |
        cat > platforms/android/release-signing.properties << EOF
        storeFile=../../debug.keystore
        storePassword=android
        keyAlias=androiddebugkey
        keyPassword=android
        EOF

    - name: Build APK for ${{ matrix.arch }}
      run: |
        cd platforms/android
        
        # 只构建目标架构
        ./gradlew assembleRelease \
          -Pandroid.injected.build.abi=${{ matrix.arch }} \
          --stacktrace
        
        cd ../..
        
        mkdir -p outputs
        
        # 查找并复制生成的 APK
        APK_PATH=$(find platforms/android/app/build/outputs/apk/release -name "*.apk" | grep -i "${{ matrix.arch }}" | head -1)
        if [ -n "$APK_PATH" ]; then
          cp "$APK_PATH" "outputs/app-${{ matrix.apk-suffix }}.apk"
          echo "APK built: outputs/app-${{ matrix.apk-suffix }}.apk"
          ls -lh outputs/
        else
          echo "Error: APK not found for ${{ matrix.arch }}!"
          find platforms/android/app/build/outputs -name "*.apk"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ matrix.apk-suffix }}
        path: outputs/*.apk
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all APKs
      uses: actions/download-artifact@v4
      with:
        path: apks
        pattern: app-*
        merge-multiple: true

    - name: List APKs
      run: |
        echo "Downloaded APKs:"
        ls -lh apks/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: apks/*.apk
        generate_release_notes: true
        body: |
          ## 📱 多架构 APK 构建
          
          **版本**: ${{ github.ref_name }}
          
          ### 下载指引
          
          | 架构 | 文件 | 适用设备 |
          |------|------|----------|
          | arm64-v8a | app-arm64.apk | 现代 64 位 ARM 设备（推荐） |
          | armeabi-v7a | app-arm.apk | 旧款 32 位 ARM 设备 |
          | x86 | app-x86.apk | 英特尔 x86 设备/模拟器 |
          | x86_64 | app-x64.apk | 64 位英特尔设备 |
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
