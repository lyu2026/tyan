name: Build Android APKs

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name'
        required: true
        default: '1.0.0'
      version_code:
        description: 'Version Code'
        required: true
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86, x86_64]
        include:
          - arch: arm64-v8a
            abi: arm64-v8a
            apk-suffix: arm64
          - arch: armeabi-v7a
            abi: armeabi-v7a
            apk-suffix: arm
          - arch: x86
            abi: x86
            apk-suffix: x86
          - arch: x86_64
            abi: x86_64
            apk-suffix: x64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-33 build-tools;33.0.0'

    - name: Generate keystore
      run: |
        keytool -genkey -v \
          -keystore debug.keystore \
          -alias androiddebugkey \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass android \
          -keypass android \
          -dname "CN=Android Debug, O=Android, C=US"

    - name: Install dependencies
      run: |
        npm install
        npm install -g cordova

    - name: Add Android platform
      run: cordova platform add android@latest

    - name: Configure multi-architecture
      run: |
        cat > platforms/android/app/build-extras.gradle << 'EOF'
        android {
            splits {
                abi {
                    enable true
                    reset()
                    include 'arm64-v8a', 'armeabi-v7a', 'x86', 'x86_64'
                    universalApk false
                }
            }
            
            applicationVariants.all { variant ->
                variant.outputs.all { output ->
                    def abi = output.getFilter(com.android.build.OutputFile.ABI)
                    if (abi != null) {
                        def abiVersionCode = 0
                        switch(abi) {
                            case 'arm64-v8a': abiVersionCode = 1; break
                            case 'armeabi-v7a': abiVersionCode = 2; break
                            case 'x86': abiVersionCode = 3; break
                            case 'x86_64': abiVersionCode = 4; break
                        }
                        output.versionCodeOverride = variant.versionCode * 10 + abiVersionCode
                        output.outputFileName = "app-${abi}.apk"
                    }
                }
            }
        }
        EOF

    - name: Update version
      run: |
        VERSION_NAME="${{ github.event.inputs.version_name || github.ref_name }}"
        VERSION_CODE="${{ github.event.inputs.version_code || github.run_number }}"
        sed -i "s/version=\"[^\"]*\"/version=\"$VERSION_NAME\"/" config.xml
        sed -i "s/android-versionCode=\"[^\"]*\"/android-versionCode=\"$VERSION_CODE\"/" config.xml

    - name: Create signing config
      run: |
        mkdir -p platforms/android/
        cat > platforms/android/release-signing.properties << EOF
        storeFile=../../debug.keystore
        storePassword=android
        keyAlias=androiddebugkey
        keyPassword=android
        EOF

    - name: Build APK for ${{ matrix.arch }}
      run: |
        cordova build android --release -- --packageType=apk
        mkdir -p outputs
        find platforms/android/app/build/outputs/apk -name "*.apk" -exec cp {} outputs/app-${{ matrix.apk-suffix }}.apk \;

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ matrix.apk-suffix }}
        path: outputs/*.apk
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all APKs
      uses: actions/download-artifact@v4
      with:
        path: apks
        pattern: app-*
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: apks/*.apk
        generate_release_notes: true
        body: |
          ## 📱 多架构 APK
          
          | 架构 | 适用设备 |
          |------|----------|
          | arm64-v8a | 现代 64 位 ARM 设备（大部分手机） |
          | armeabi-v7a | 旧款 32 位 ARM 设备 |
          | x86 | 英特尔 Android 设备/模拟器 |
          | x86_64 | 64 位英特尔设备 |
          
          请根据设备架构选择对应的 APK 安装。
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
