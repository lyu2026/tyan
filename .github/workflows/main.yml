name: Debug - 打印 Secrets

on:
  workflow_dispatch:        # 手动触发
    inputs:
      secret_name:
        description: '要打印的 Secret 名称'
        required: true
        type: choice
        options:
          - DEPLOY_TOKEN
          - DOCKER_PASSWORD
          - SSH_PRIVATE_KEY
          - ALL

jobs:
  print-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: 打印单个 Secret
        if: ${{ github.event.inputs.secret_name != 'ALL' }}
        run: |
          SECRET_VALUE="${{ secrets[github.event.inputs.secret_name] }}"
          echo "========== ${{ github.event.inputs.secret_name }} =========="
          echo "$SECRET_VALUE" | base64
          echo "=========================="
          echo "Base64 解码命令:"
          echo "echo '上面的密文' | base64 -d"

      - name: 打印所有 Secrets
        if: ${{ github.event.inputs.secret_name == 'ALL' }}
        run: |
          echo "========== DEPLOY_TOKEN =========="
          echo "${{ secrets.DEPLOY_TOKEN }}" | base64
          
          echo "========== DOCKER_PASSWORD =========="
          echo "${{ secrets.DOCKER_PASSWORD }}" | base64
          
          echo "========== SSH_PRIVATE_KEY =========="
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64
          
          echo "=========================="
          echo "Base64 解码命令: 将上面密文用 base64 -d 解码"
